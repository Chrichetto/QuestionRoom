<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiedi Pure - Anonimo</title>
    <style>
        :root {
            --orange: #ff9100;
            --red: #ff3d00;
            --magenta: #d500f9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--orange), var(--red), var(--magenta), var(--orange));
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo-watermark {
            width: 120px; /* Leggermente più grande per il nuovo logo */
            margin: 0 auto 15px auto;
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-size: 1rem;
            outline: none;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--orange), var(--red), var(--magenta));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }
        h2 { color: #333; margin: 0; }
        p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-watermark">
        <img src="https://raw.githubusercontent.com/Chrichetto/QuestionRoom/main/logo_fdv.png" alt="Logo" style="width:100%; border-radius: 10px;">
    </div>
    <h2>Chiedi Pure</h2>
    <p>La tua domanda resterà totalmente anonima.</p>
    
    <div class="input-box">
        <textarea id="questionInput" placeholder="Scrivi qui..."></textarea>
        <button onclick="sendQuestion()">Invia Domanda</button>
    </div>
    <div id="status" style="margin-top:15px; font-weight: bold;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    const SUPABASE_URL = 'https://qkbdkkzoopgjwmpfxopf.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_qVBhXfldN5ovPYMrWLpu7Q_X54PWOTz';
    
    // Inizializzazione pulita
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function sendQuestion() {
        const input = document.getElementById('questionInput');
        const status = document.getElementById('status');
        const text = input.value.trim();

        if (!text) {
            status.innerText = "Scrivi qualcosa!";
            status.style.color = "orange";
            return;
        }

        try {
            const { error } = await supabaseClient
                .from('domande_anonime')
                .insert([{ testo_domanda: text }]);

            if (error) throw error;

            status.innerText = "Inviata con successo!";
            status.style.color = "green";
            input.value = "";
        } catch (err) {
            console.error(err);
            status.innerText = "Errore di connessione.";
            status.style.color = "red";
        }
    }
</script>
</body>
</html>
